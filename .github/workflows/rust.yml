name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install Prerequisites
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstrtspserver-1.0-dev libges-1.0-dev
    - name: Build
      run: cargo build --release --verbose
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rfvp-binaries
        path: |
          target/release/rfvp
          target/release/assembler
          target/release/disassembler
          target/release/video_player
          README.md
          LICENSE
        if-no-files-found: warn
